name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Télécharger le projet
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip git build-essential autoconf automake libtool pkg-config libffi-dev libssl-dev zlib1g-dev
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Construire l'APK
        run: |
          yes | buildozer android debug

      - name: Récupérer l'APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartBatteryAI-APK
          path: bin/*.apk
